name: FastAPI CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest

  docker:

    runs-on: ubuntu-latest

    needs: test

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build docker image
      run: |
        docker build -t fastapi-app .